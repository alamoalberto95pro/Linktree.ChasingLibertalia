<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Chasing Libertalia — Pedales, carreteras y horizontes infinitos">
  <title>Chasing Libertalia</title>

  <link href="https://fonts.cdnfonts.com/css/the-seasons" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garant:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">

  <style>
    /* ============================================
       RESET & BRAND VARIABLES
    ============================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --turquesa:  #52BBA8;
      --azul:      #5B8ECC;
      --arena:     #C9A870;
      --naranja:   #CC7828;
      --calido:    #EFC9A0;
      --text:      #1E1E1E;
      --text-mid:  #6B6B6B;
      --border:    rgba(0,0,0,0.08);
      --card-bg:   #FFFFFF;
      --shadow:    0 2px 18px rgba(0,0,0,0.07);
      --shadow-h:  0 10px 36px rgba(0,0,0,0.13);
    }

    /* ============================================
       BASE
    ============================================ */
    html, body { min-height: 100%; }

    body {
      background: #FFFFFF;
      font-family: 'Cormorant Garant', Georgia, serif;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 52px 20px 64px;
      position: relative;
      overflow-x: hidden;
    }

    /* ============================================
       BACKGROUND SKETCH ILLUSTRATIONS
       — fixed, very low opacity, corner-placed
    ============================================ */
    .bg-sketches {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .sk {
      position: absolute;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ── Camera (DSLR) — top left ── */
    .sk-camera {
      top: 2vh; left: 1vw;
      transform: rotate(-14deg);
      opacity: 0.09;
    }

    /* ── Bicycle — top right ── */
    .sk-bike {
      top: 3vh; right: 0vw;
      transform: rotate(10deg);
      opacity: 0.09;
    }

    /* ── Backpack — mid left ── */
    .sk-pack {
      top: 38vh; left: -1vw;
      transform: rotate(8deg);
      opacity: 0.08;
    }

    /* ── GoPro — mid right ── */
    .sk-gopro {
      top: 42vh; right: 0vw;
      transform: rotate(-10deg);
      opacity: 0.08;
    }

    /* ── Campervan — bottom right ── */
    .sk-van {
      bottom: 3vh; right: 0vw;
      transform: rotate(-7deg);
      opacity: 0.09;
    }

    /* ── Mountains + tent — bottom left ── */
    .sk-mountains {
      bottom: 2vh; left: 0vw;
      transform: rotate(5deg);
      opacity: 0.08;
    }

    /* Hide side sketches on very narrow screens to avoid content overlap */
    @media (max-width: 500px) {
      .sk-pack, .sk-gopro { display: none; }
      .sk-camera  { opacity: 0.06; }
      .sk-bike    { opacity: 0.06; }
      .sk-van     { opacity: 0.06; }
      .sk-mountains { opacity: 0.06; }
    }

    /* ============================================
       PAGE WRAPPER — responsive
    ============================================ */
    .page-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
    }

    @media (min-width: 768px) {
      body           { padding: 68px 32px 80px; }
      .page-wrapper  { max-width: 520px; }
    }

    @media (min-width: 1024px) {
      body           { padding: 88px 40px 100px; }
      .page-wrapper  { max-width: 540px; }
    }

    /* ============================================
       HEADER
    ============================================ */
    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .brand-name {
      font-family: 'The Seasons', Georgia, serif;
      font-weight: 400;
      font-size: clamp(2.5rem, 10vw, 3.8rem);
      letter-spacing: 0.06em;
      color: var(--text);
      line-height: 1.1;
      margin-bottom: 16px;
    }

    @media (min-width: 768px) {
      .brand-name { font-size: clamp(3.2rem, 6vw, 3.8rem); }
    }

    /* Four-color accent bar under the title */
    .color-bar {
      display: flex;
      justify-content: center;
      gap: 4px;
      margin-bottom: 16px;
    }

    .color-bar span {
      height: 3px;
      width: 32px;
      border-radius: 2px;
    }

    .tagline {
      font-family: 'Cormorant Garant', Georgia, serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(0.9rem, 2.5vw, 1rem);
      color: var(--text-mid);
      letter-spacing: 0.1em;
    }

    /* ============================================
       SEPARATOR
    ============================================ */
    .sep {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }

    .sep-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--border), transparent);
    }

    .sep-dot {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--calido);
      flex-shrink: 0;
    }

    /* ============================================
       LINK CARDS
    ============================================ */
    .links-container {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .link-card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 17px 20px 17px 0;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-left: 3.5px solid var(--card-accent, #ddd);
      border-radius: 12px;
      box-shadow: var(--shadow);
      text-decoration: none;
      color: var(--text);
      position: relative;
      cursor: pointer;
      transition: transform 0.22s ease, box-shadow 0.22s ease, background 0.22s ease;
      overflow: hidden;
    }

    /* Subtle color wash on hover */
    .link-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--card-accent-pale, transparent);
      opacity: 0;
      transition: opacity 0.22s ease;
      pointer-events: none;
    }

    .link-card:not(.coming-soon):hover,
    .link-card:not(.coming-soon):focus-visible {
      transform: translateY(-3px);
      box-shadow: var(--shadow-h);
      outline: none;
    }

    .link-card:not(.coming-soon):hover::after {
      opacity: 1;
    }

    .link-card:not(.coming-soon):focus-visible {
      outline: 2px solid var(--card-accent);
      outline-offset: 3px;
    }

    .link-card.coming-soon {
      opacity: 0.45;
      cursor: not-allowed;
    }

    /* Per-card brand colors */
    .card-youtube {
      --card-accent:      var(--turquesa);
      --card-accent-pale: rgba(82, 187, 168, 0.05);
    }
    .card-tiktok {
      --card-accent:      var(--azul);
      --card-accent-pale: rgba(91, 142, 204, 0.05);
    }
    .card-camara {
      --card-accent:      var(--naranja);
      --card-accent-pale: rgba(204, 120, 40, 0.05);
    }
    .card-furgo {
      --card-accent:      var(--arena);
      --card-accent-pale: rgba(201, 168, 112, 0.05);
    }

    /* Icon */
    .card-icon {
      width: 42px; height: 42px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-left: 16px;
    }

    .card-icon svg { width: 28px; height: 28px; }

    /* Text */
    .card-body { flex: 1; }

    .card-title {
      font-family: 'The Seasons', Georgia, serif;
      font-weight: 400;
      font-size: clamp(1rem, 3vw, 1.1rem);
      letter-spacing: 0.03em;
      color: var(--text);
      line-height: 1.2;
    }

    .card-sub {
      font-family: 'Cormorant Garant', Georgia, serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(0.78rem, 2vw, 0.85rem);
      color: var(--text-mid);
      letter-spacing: 0.04em;
      margin-top: 3px;
    }

    /* Arrow */
    .card-arrow {
      color: var(--card-accent, #aaa);
      font-size: 1.1rem;
      flex-shrink: 0;
      margin-right: 18px;
      transition: transform 0.22s ease;
      opacity: 0.8;
    }

    .link-card:not(.coming-soon):hover .card-arrow {
      transform: translateX(4px);
    }

    /* Badge */
    .badge {
      position: absolute;
      top: -9px; right: 16px;
      background: var(--naranja);
      color: #fff;
      font-family: 'Cormorant Garant', serif;
      font-style: italic;
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      padding: 2px 12px;
      border-radius: 20px;
    }

    /* ============================================
       FOOTER
    ============================================ */
    .footer {
      margin-top: 40px;
      text-align: center;
    }

    .footer-colors {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-bottom: 12px;
    }

    .footer-colors span {
      width: 6px; height: 6px;
      border-radius: 50%;
    }

    .footer-text {
      font-family: 'Cormorant Garant', serif;
      font-weight: 300;
      font-size: 0.72rem;
      color: var(--text-mid);
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    /* ============================================
       TOAST
    ============================================ */
    .toast {
      position: fixed;
      bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: var(--text);
      color: #fff;
      font-family: 'Cormorant Garant', serif;
      font-style: italic;
      font-size: 0.9rem;
      letter-spacing: 0.06em;
      padding: 10px 24px;
      border-radius: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease, transform 0.3s ease;
      z-index: 100;
      white-space: nowrap;
      border-left: 3px solid var(--turquesa);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

  <!-- ═══════════════════════════════════════
       BACKGROUND SKETCH ILLUSTRATIONS
  ═══════════════════════════════════════ -->
  <div class="bg-sketches" aria-hidden="true">

  <script>
    document.querySelectorAll('.link-card.coming-soon').forEach(function (card) {
      card.addEventListener('click', function () { showToast('¡Próximamente disponible!'); });
    });

    function showToast(msg) {
      var e = document.querySelector('.toast');
      if (e) e.remove();
      var t = document.createElement('div');
      t.className = 'toast';
      t.textContent = msg;
      document.body.appendChild(t);
      requestAnimationFrame(function () {
        requestAnimationFrame(function () { t.classList.add('show'); });
      });
      setTimeout(function () {
        t.classList.remove('show');
        setTimeout(function () { t.remove(); }, 350);
      }, 2400);
    }
  </script>
