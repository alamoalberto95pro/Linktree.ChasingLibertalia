<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Chasing Libertalia — Pedales, carreteras y horizontes infinitos">
  <title>Chasing Libertalia</title>

  <!-- The Seasons font -->
  <link href="https://fonts.cdnfonts.com/css/the-seasons" rel="stylesheet">
  <!-- Cormorant Garant for secondary text -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garant:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">

  <style>
    /* ============================================
       RESET & VARIABLES
    ============================================ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg:          #F9F2E7;
      --cream-light: #F5E6D0;
      --cream-card:  #FDF8F1;
      --brown-light: #C4956A;
      --brown-mid:   #8B5E3C;
      --brown-dark:  #6B4226;
      --brown-text:  #4A2C17;
      --border:      rgba(196, 149, 106, 0.30);
      --shadow-sm:   0 2px 16px rgba(107, 66, 38, 0.07);
      --shadow-hover:0 12px 40px rgba(107, 66, 38, 0.16);
    }

    /* ============================================
       BASE
    ============================================ */
    html { min-height: 100%; }

    body {
      min-height: 100vh;
      background: linear-gradient(158deg, #FAF5EC 0%, #F5E8D3 55%, #EEDAD0 100%);
      font-family: 'Cormorant Garant', Georgia, serif;
      color: var(--brown-text);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px 60px;
    }

    /* ============================================
       LAYOUT WRAPPER — responsive max-widths
    ============================================ */
    .page-wrapper {
      width: 100%;
      max-width: 480px;          /* mobile */
    }

    @media (min-width: 768px) {  /* tablet */
      body           { padding: 64px 32px 80px; }
      .page-wrapper  { max-width: 520px; }
    }

    @media (min-width: 1024px) { /* desktop */
      body           { padding: 80px 40px 100px; }
      .page-wrapper  { max-width: 540px; }
    }

    /* ============================================
       HEADER
    ============================================ */
    .header {
      text-align: center;
      margin-bottom: 36px;
    }

    /* Thin rule above title */
    .header-rule {
      width: 48px;
      height: 1px;
      background: var(--brown-light);
      margin: 0 auto 22px;
      opacity: 0.7;
    }

    .brand-name {
      font-family: 'The Seasons', Georgia, serif;
      font-weight: 400;
      font-size: clamp(2.3rem, 9vw, 3.5rem);
      letter-spacing: 0.07em;
      color: var(--brown-dark);
      line-height: 1.1;
      margin-bottom: 14px;
    }

    @media (min-width: 768px) {
      .brand-name { font-size: clamp(3rem, 6vw, 3.6rem); }
    }

    .tagline {
      font-family: 'Cormorant Garant', Georgia, serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(0.9rem, 2.5vw, 1rem);
      color: var(--brown-mid);
      letter-spacing: 0.12em;
    }

    /* ============================================
       ILLUSTRATION — subtle travel emblem
    ============================================ */
    .emblem {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 10px;
      margin: 0 0 36px;
      opacity: 0.55;
    }

    .emblem svg {
      fill: none;
      stroke: var(--brown-mid);
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 1.6;
      display: block;
      flex-shrink: 0;
    }

    /* ============================================
       SEPARATOR
    ============================================ */
    .sep {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .sep-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--brown-light), transparent);
    }

    .sep-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--brown-light);
      opacity: 0.75;
      flex-shrink: 0;
    }

    /* ============================================
       LINK CARDS
    ============================================ */
    .links-container {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .link-card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 17px 20px;
      background: var(--cream-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: var(--shadow-sm);
      text-decoration: none;
      color: var(--brown-text);
      position: relative;
      cursor: pointer;
      transition:
        transform  0.22s ease,
        box-shadow 0.22s ease;
    }

    @media (min-width: 768px) {
      .link-card { padding: 19px 24px; gap: 18px; }
    }

    .link-card:not(.coming-soon):hover,
    .link-card:not(.coming-soon):focus-visible {
      transform: translateY(-3px);
      box-shadow: var(--shadow-hover);
      outline: none;
    }

    .link-card:not(.coming-soon):focus-visible {
      outline: 2px solid var(--brown-mid);
      outline-offset: 3px;
    }

    /* Left accent line on hover */
    .link-card:not(.coming-soon)::before {
      content: '';
      position: absolute;
      left: 0;
      top: 20%;
      bottom: 20%;
      width: 2.5px;
      background: var(--brown-light);
      border-radius: 0 2px 2px 0;
      opacity: 0;
      transition: opacity 0.22s ease;
    }

    .link-card:not(.coming-soon):hover::before {
      opacity: 1;
    }

    /* Coming-soon */
    .link-card.coming-soon {
      opacity: 0.48;
      cursor: not-allowed;
    }

    /* Icon */
    .card-icon {
      width: 38px;
      height: 38px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-icon svg {
      width: 28px;
      height: 28px;
    }

    /* Text */
    .card-body { flex: 1; }

    .card-title {
      font-family: 'The Seasons', Georgia, serif;
      font-weight: 400;
      font-size: clamp(1rem, 3vw, 1.1rem);
      color: var(--brown-dark);
      letter-spacing: 0.03em;
      line-height: 1.2;
    }

    .card-sub {
      font-family: 'Cormorant Garant', Georgia, serif;
      font-style: italic;
      font-size: clamp(0.78rem, 2vw, 0.85rem);
      font-weight: 300;
      color: var(--brown-mid);
      letter-spacing: 0.05em;
      margin-top: 3px;
    }

    /* Arrow */
    .card-arrow {
      color: var(--brown-light);
      font-size: 1.1rem;
      flex-shrink: 0;
      transition: transform 0.22s ease;
      opacity: 0.8;
    }

    .link-card:not(.coming-soon):hover .card-arrow {
      transform: translateX(4px);
    }

    /* Badge */
    .badge {
      position: absolute;
      top: -9px;
      right: 16px;
      background: var(--brown-mid);
      color: var(--cream-card);
      font-family: 'Cormorant Garant', serif;
      font-style: italic;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      padding: 2px 10px;
      border-radius: 20px;
    }

    /* ============================================
       FOOTER
    ============================================ */
    .footer {
      margin-top: 40px;
      text-align: center;
    }

    .footer-sep {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .footer-line {
      width: 40px;
      height: 1px;
      background: var(--brown-light);
      opacity: 0.4;
    }

    .footer-mark {
      width: 5px;
      height: 5px;
      border: 1px solid var(--brown-light);
      border-radius: 50%;
      transform: rotate(45deg);
      opacity: 0.5;
      flex-shrink: 0;
    }

    .footer-text {
      font-family: 'Cormorant Garant', serif;
      font-size: 0.72rem;
      font-weight: 300;
      color: var(--brown-light);
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    /* ============================================
       TOAST
    ============================================ */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: var(--brown-dark);
      color: var(--cream-light);
      font-family: 'Cormorant Garant', serif;
      font-style: italic;
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      padding: 10px 24px;
      border-radius: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease, transform 0.3s ease;
      z-index: 100;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

  <div class="page-wrapper">

    <!-- ─── HEADER ─── -->
    <header class="header">
      <div class="header-rule" aria-hidden="true"></div>
      <h1 class="brand-name">Chasing Libertalia</h1>
      <p class="tagline">Pedales, carreteras &amp; horizontes infinitos</p>
    </header>

    <!-- ─── TRAVEL EMBLEM (bicycle · mountains · van) ─── -->
    <div class="emblem" aria-hidden="true">

      <!-- Bicycle -->
      <svg width="66" height="46" viewBox="0 0 70 48">
        <circle cx="13" cy="34" r="12"/>
        <circle cx="57" cy="34" r="12"/>
        <line x1="33" y1="34" x2="13" y2="34"/>
        <line x1="30" y1="15" x2="13" y2="34"/>

        <rect x="8"  y="15" width="11" height="8" rx="1" stroke-width="1.2"/>
        <rect x="24" y="15" width="11" height="8" rx="1" stroke-width="1.2"/>
        <circle cx="18" cy="35" r="7"/>
        <circle cx="56" cy="35" r="7"/>
        <line x1="2"  y1="9"  x2="62" y2="9" stroke-width="1.4"/>
        <line x1="12" y1="9"  x2="12" y2="11"/>
        <line x1="24" y1="9"  x2="24" y2="11"/>
        <line x1="36" y1="9"  x2="36" y2="11"/>
        <line x1="48" y1="9"  x2="48" y2="11"/>
        <line x1="46" y1="11" x2="46" y2="35"/>
      </svg>

    </div>

    <!-- ─── SEPARATOR ─── -->
    <div class="sep" aria-hidden="true">
      <div class="sep-line"></div>
      <div class="sep-dot"></div>
      <div class="sep-dot"></div>
      <div class="sep-dot"></div>
      <div class="sep-line"></div>
    </div>

    <!-- ─── LINK CARDS ─── -->
    <nav aria-label="Links de Chasing Libertalia">
      <div class="links-container">

        <!-- 1. YouTube -->
        <a class="link-card"
           href="https://www.youtube.com/@ChasingLibertalia"
           target="_blank"
           rel="noopener noreferrer"
           aria-label="Canal de YouTube de Chasing Libertalia">
          <div class="card-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M22.54 6.42c-.27-.99-1.05-1.77-2.04-2.04C18.88 4 12 4 12 4S5.12 4 3.5 4.38c-.99.27-1.77 1.05-2.04 2.04C1 8.19 1 11.75 1 11.75s0 3.56.46 5.33c.27.99 1.05 1.77 2.04 2.04C5.12 19.5 12 19.5 12 19.5s6.88 0 8.5-.38c.99-.27 1.77-1.05 2.04-2.04C23 15.31 23 11.75 23 11.75s0-3.56-.46-5.33z"
                    stroke="#8B5E3C" stroke-width="1.4" stroke-linejoin="round"/>
              <path d="M9.75 15.02L15.5 11.75 9.75 8.48v6.54z"
                    stroke="#8B5E3C" stroke-width="1.4" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="card-body">
            <div class="card-title">YouTube</div>
            <div class="card-sub">Vídeos de aventuras &amp; viajes</div>
          </div>
          <span class="card-arrow" aria-hidden="true">→</span>
        </a>

        <!-- 2. TikTok -->
        <a class="link-card"
           href="https://www.tiktok.com/@chasinglibertalia"
           target="_blank"
           rel="noopener noreferrer"
           aria-label="TikTok de Chasing Libertalia">
          <div class="card-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.27 6.27 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.18 8.18 0 0 0 4.78 1.52V6.79a4.85 4.85 0 0 1-1.01-.1z"
                    stroke="#8B5E3C" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="card-body">
            <div class="card-title">TikTok</div>
            <div class="card-sub">Clips cortos del camino</div>
          </div>
          <span class="card-arrow" aria-hidden="true">→</span>
        </a>

        <!-- 3. Trucos de Cámara — COMING SOON -->
        <div class="link-card coming-soon"
             role="button"
             aria-disabled="true"
             aria-label="Trucos de Cámara — Próximamente">
          <span class="badge" aria-hidden="true">Próximamente</span>
          <div class="card-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M23 7l-7 5 7 5V7z"

              <rect x="1" y="5" width="15" height="14" rx="2"

          <div class="card-body">
            <div class="card-title">Trucos de Cámara</div>
            <div class="card-sub">Guías de filmación en ruta</div>
          </div>
          <span class="card-arrow" aria-hidden="true">→</span>
        </div>

        <!-- 4. Trucos de Furgo — COMING SOON -->
        <div class="link-card coming-soon"
             role="button"
             aria-disabled="true"
             aria-label="Trucos de Furgo — Próximamente">
          <span class="badge" aria-hidden="true">Próximamente</span>
          <div class="card-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M1 8 L1 18 L23 18 L23 11 L18 8 Z"
                    stroke="#8B5E3C" stroke-width="1.4" stroke-linejoin="round"/>
              <path d="M18 8 L22 12 L22 16 L18 16 L18 8"
                    stroke="#8B5E3C" stroke-width="1.4" stroke-linejoin="round"/>
              <rect x="3" y="10" width="5" height="4" rx="0.5"
                    stroke="#8B5E3C" stroke-width="1.2"/>
              <circle cx="6"  cy="18" r="2.5" stroke="#8B5E3C" stroke-width="1.4"/>
              <circle cx="18" cy="18" r="2.5" stroke="#8B5E3C" stroke-width="1.4"/>
              <line x1="1"  y1="6.5" x2="18" y2="6.5" stroke="#8B5E3C" stroke-width="1.2"/>
              <line x1="5"  y1="6.5" x2="5"  y2="8"   stroke="#8B5E3C" stroke-width="1"/>
              <line x1="10" y1="6.5" x2="10" y2="8"   stroke="#8B5E3C" stroke-width="1"/>
              <line x1="15" y1="6.5" x2="15" y2="8"   stroke="#8B5E3C" stroke-width="1"/>
            </svg>
          </div>
          <div class="card-body">
            <div class="card-title">Trucos de Furgo</div>
            <div class="card-sub">Vida en campervan &amp; van life</div>
          </div>
          <span class="card-arrow" aria-hidden="true">→</span>
        </div>

      </div>
    </nav>

    <!-- ─── FOOTER ─── -->
    <footer class="footer">
      <div class="footer-sep" aria-hidden="true">
        <div class="footer-line"></div>
        <div class="footer-mark"></div>
        <div class="footer-line"></div>
      </div>
      <p class="footer-text">© 2025 Chasing Libertalia</p>
    </footer>

  </div><!-- /.page-wrapper -->

  <script>
    document.querySelectorAll('.link-card.coming-soon').forEach(function (card) {
      card.addEventListener('click', function () {
        showToast('¡Próximamente disponible!');
      });
    });

    function showToast(msg) {
      var existing = document.querySelector('.toast');
      if (existing) existing.remove();

      var t = document.createElement('div');
      t.className = 'toast';
      t.textContent = msg;
      document.body.appendChild(t);

      requestAnimationFrame(function () {
        requestAnimationFrame(function () { t.classList.add('show'); });
      });

      setTimeout(function () {
        t.classList.remove('show');
        setTimeout(function () { t.remove(); }, 350);
      }, 2400);
    }
  </script>

</body>
</html>
