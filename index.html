<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Chasing Libertalia — Travel Vlogger · Van Life · Bikepacking">
  <title>Chasing Libertalia</title>

  <link href="https://fonts.cdnfonts.com/css/the-seasons" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garant:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">

  <style>
    /* ============================================
       RESET & BRAND VARIABLES
    ============================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --turquesa: #52BBA8;
      --azul:     #5B8ECC;
      --arena:    #C9A870;
      --naranja:  #CC7828;
      --calido:   #EFC9A0;
      --white:    #FFFFFF;
      --dark:     #1E1E1E;
    }

    /* ============================================
       BASE — photo background like Marjan ref
    ============================================ */
    html, body { min-height: 100%; }

    body {
      min-height: 100vh;
      /* Background photo w/ brand gradient fallback */
      background-color: #78A0C0;
      background-image:
        linear-gradient(180deg,
          rgba(0,0,0,0.10) 0%,
          rgba(0,0,0,0.00) 35%,
          rgba(0,0,0,0.15) 100%),
        url('./images/hero.jpg'),
        linear-gradient(175deg,
          #5B8ECC 0%,
          #7FA9D1 25%,
          #C9A870 65%,
          #CC7828 100%);
      background-size: cover, cover, cover;
      background-position: center top, center top, center;
      background-attachment: fixed, fixed, fixed;
      background-repeat: no-repeat;
      font-family: 'Cormorant Garant', Georgia, serif;
      color: var(--white);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 44px 18px 40px;
      position: relative;
      overflow-x: hidden;
    }

    /* ============================================
       RESPONSIVE WRAPPER
    ============================================ */
    .page-wrapper {
      width: 100%;
      max-width: 440px;
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    @media (min-width: 768px) {
      body           { padding: 60px 32px 52px; }
      .page-wrapper  { max-width: 480px; }
    }

    @media (min-width: 1024px) {
      body           { padding: 72px 40px 60px; }
      .page-wrapper  { max-width: 500px; }
    }

    /* ============================================
       PROFILE PHOTO
    ============================================ */
    .profile {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background-color: var(--azul);
      background-image: url('./images/profile.jpg'),
        linear-gradient(135deg, var(--turquesa), var(--azul));
      background-size: cover, cover;
      background-position: center, center;
      background-repeat: no-repeat;
      border: 3px solid rgba(255, 255, 255, 0.95);
      box-shadow: 0 6px 28px rgba(0, 0, 0, 0.28);
      margin-bottom: 18px;
    }

    @media (min-width: 768px) {
      .profile { width: 124px; height: 124px; }
    }

    /* ============================================
       HEADER — name + tagline
    ============================================ */
    .brand-name {
      font-family: 'The Seasons', Georgia, serif;
      font-weight: 400;
      font-size: clamp(2.1rem, 8.5vw, 3rem);
      letter-spacing: 0.04em;
      color: var(--white);
      line-height: 1.15;
      text-align: center;
      margin-bottom: 10px;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.35);
    }

    @media (min-width: 768px) {
      .brand-name { font-size: clamp(2.8rem, 5.5vw, 3.4rem); }
    }

    .tagline {
      font-family: 'Cormorant Garant', Georgia, serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(0.9rem, 2.5vw, 1.05rem);
      color: var(--white);
      letter-spacing: 0.12em;
      text-align: center;
      text-shadow: 0 1px 8px rgba(0, 0, 0, 0.35);
      margin-bottom: 6px;
    }

    /* Four-color brand dot accent under tagline */
    .dot-row {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-bottom: 32px;
      margin-top: 14px;
    }

    .dot-row span {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.25);
    }

    /* ============================================
       TORN-PAPER LINK CARDS
    ============================================ */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .link-card {
      background: var(--white);
      padding: 28px 24px;
      text-align: center;
      text-decoration: none;
      color: var(--dark);
      position: relative;
      cursor: pointer;
      /* Torn-paper top & bottom edges via clip-path */
      clip-path: polygon(
        0% 18%,   6% 6%,   13% 22%, 21% 8%,   29% 20%,
        37% 10%,  45% 22%, 53% 6%,  61% 20%,  69% 10%,
        77% 22%,  85% 6%,  93% 20%, 100% 10%,
        100% 82%, 93% 94%, 85% 80%, 77% 92%,  69% 82%,
        61% 94%,  53% 80%, 45% 92%, 37% 82%,  29% 94%,
        21% 80%,  13% 92%, 6% 82%,  0% 94%
      );
      transition: transform 0.25s ease, filter 0.25s ease;
      filter: drop-shadow(0 4px 18px rgba(0, 0, 0, 0.22));
    }

    .link-card:not(.coming-soon):hover,
    .link-card:not(.coming-soon):focus-visible {
      transform: translateY(-3px) scale(1.01);
      filter: drop-shadow(0 10px 28px rgba(0, 0, 0, 0.3));
      outline: none;
    }

    .link-card.coming-soon {
      opacity: 0.75;
      cursor: not-allowed;
    }

    /* Card title */
    .card-title {
      font-family: 'The Seasons', Georgia, serif;
      font-weight: 400;
      font-size: clamp(1.15rem, 4vw, 1.35rem);
      letter-spacing: 0.04em;
      color: var(--dark);
      line-height: 1.2;
    }

    .card-title small {
      display: block;
      margin-top: 4px;
      font-family: 'Cormorant Garant', Georgia, serif;
      font-style: italic;
      font-size: 0.72rem;
      color: #999;
      letter-spacing: 0.08em;
      font-weight: 300;
    }

    /* Per-card brand accent — subtle colored dot before title */
    .card-youtube  .card-title::before,
    .card-tiktok   .card-title::before,
    .card-camara   .card-title::before,
    .card-furgo    .card-title::before {
      content: '';
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      margin-right: 10px;
      vertical-align: middle;
      transform: translateY(-2px);
    }
    .card-youtube .card-title::before { background: var(--turquesa); }
    .card-tiktok  .card-title::before { background: var(--azul); }
    .card-camara  .card-title::before { background: var(--naranja); }
    .card-furgo   .card-title::before { background: var(--arena); }

    /* "Próximamente" badge for coming-soon */
    .card-title em {
      display: inline-block;
      margin-left: 8px;
      font-family: 'Cormorant Garant', serif;
      font-style: italic;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 2px 10px;
      border-radius: 20px;
      background: var(--naranja);
      color: var(--white);
      vertical-align: middle;
      transform: translateY(-2px);
    }

    .card-furgo .card-title em { background: var(--arena); color: var(--dark); }

    /* ============================================
       SOCIAL ICONS
    ============================================ */
    .socials {
      display: flex;
      justify-content: center;
      gap: 26px;
      margin-top: 30px;
      margin-bottom: 22px;
    }

    .social-link {
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--white);
      opacity: 0.92;
      transition: transform 0.2s ease, opacity 0.2s ease;
      text-decoration: none;
      filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.3));
    }

    .social-link:hover,
    .social-link:focus-visible {
      transform: translateY(-2px) scale(1.08);
      opacity: 1;
      outline: none;
    }

    .social-link svg {
      width: 100%;
      height: 100%;
    }

    /* ============================================
       FOOTER
    ============================================ */
    .footer {
      font-family: 'Cormorant Garant', serif;
      font-weight: 300;
      font-size: 0.7rem;
      color: rgba(255, 255, 255, 0.8);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      text-shadow: 0 1px 6px rgba(0, 0, 0, 0.3);
      text-align: center;
      margin-top: 6px;
    }

    /* ============================================
       TOAST (coming-soon tap)
    ============================================ */
    .toast {
      position: fixed;
      bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: rgba(30, 30, 30, 0.95);
      color: var(--white);
      font-family: 'Cormorant Garant', serif;
      font-style: italic;
      font-size: 0.9rem;
      letter-spacing: 0.06em;
      padding: 10px 24px;
      border-radius: 24px;
      border-left: 3px solid var(--turquesa);
      backdrop-filter: blur(8px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease, transform 0.3s ease;
      z-index: 100;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

  <div class="page-wrapper">

    <!-- ─── PROFILE PHOTO ─── -->
    <div class="profile" aria-label="Chasing Libertalia"></div>

    <!-- ─── HEADER ─── -->
    <h1 class="brand-name">Chasing Libertalia</h1>
    <p class="tagline">Travel Vlogger · Van Life · Bikepacking</p>

    <!-- Brand color dots -->
    <div class="dot-row" aria-hidden="true">
      <span style="background:var(--turquesa)"></span>
      <span style="background:var(--azul)"></span>
      <span style="background:var(--arena)"></span>
      <span style="background:var(--naranja)"></span>
      <span style="background:var(--calido)"></span>
    </div>

    <!-- ─── TORN-PAPER LINK CARDS ─── -->
    <nav class="links" aria-label="Enlaces principales">

      <a class="link-card card-youtube"
         href="https://www.youtube.com/@ChasingLibertalia"
         target="_blank" rel="noopener noreferrer"
         aria-label="Canal de YouTube">
        <div class="card-title">YouTube</div>
      </a>

      <a class="link-card card-tiktok"
         href="https://www.tiktok.com/@chasinglibertalia"
         target="_blank" rel="noopener noreferrer"
         aria-label="TikTok">
        <div class="card-title">TikTok</div>
      </a>

      <div class="link-card card-camara coming-soon"
           role="button" aria-disabled="true"
           aria-label="Trucos de Cámara — Próximamente">
        <div class="card-title">Trucos de Cámara <em>Próximamente</em></div>
      </div>

      <div class="link-card card-furgo coming-soon"
           role="button" aria-disabled="true"
           aria-label="Trucos de Furgo — Próximamente">
        <div class="card-title">Trucos de Furgo <em>Próximamente</em></div>
      </div>

    </nav>

    <!-- ─── SOCIAL ICONS ─── -->
    <div class="socials" aria-label="Redes sociales">

      <!-- TikTok -->
      <a class="social-link"
         href="https://www.tiktok.com/@chasinglibertalia"
         target="_blank" rel="noopener noreferrer"
         aria-label="TikTok">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.27 6.27 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.18 8.18 0 0 0 4.78 1.52V6.79a4.85 4.85 0 0 1-1.01-.1z"/>
        </svg>
      </a>

      <!-- YouTube -->
      <a class="social-link"
         href="https://www.youtube.com/@ChasingLibertalia"
         target="_blank" rel="noopener noreferrer"
         aria-label="YouTube">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.6 12 3.6 12 3.6s-7.5 0-9.4.5A3 3 0 0 0 .5 6.2C0 8.1 0 12 0 12s0 3.9.5 5.8a3 3 0 0 0 2.1 2.1c1.9.5 9.4.5 9.4.5s7.5 0 9.4-.5a3 3 0 0 0 2.1-2.1c.5-1.9.5-5.8.5-5.8s0-3.9-.5-5.8zM9.6 15.6V8.4L15.8 12l-6.2 3.6z"/>
        </svg>
      </a>

      <!-- Instagram (placeholder para el futuro) -->
      <a class="social-link"
         href="https://www.instagram.com/chasinglibertalia"
         target="_blank" rel="noopener noreferrer"
         aria-label="Instagram">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="5"/>
          <circle cx="12" cy="12" r="4"/>
          <circle cx="17.5" cy="6.5" r="0.8" fill="currentColor"/>
        </svg>
      </a>

    </div>

    <!-- ─── FOOTER ─── -->
    <p class="footer">© 2025 Chasing Libertalia</p>

  </div><!-- /.page-wrapper -->

  <script>
    document.querySelectorAll('.link-card.coming-soon').forEach(function (card) {
      card.addEventListener('click', function () {
        showToast('¡Próximamente disponible!');
      });
    });

    function showToast(msg) {
      var e = document.querySelector('.toast');
      if (e) e.remove();
      var t = document.createElement('div');
      t.className = 'toast';
      t.textContent = msg;
      document.body.appendChild(t);
      requestAnimationFrame(function () {
        requestAnimationFrame(function () { t.classList.add('show'); });
      });
      setTimeout(function () {
        t.classList.remove('show');
        setTimeout(function () { t.remove(); }, 350);
      }, 2400);
    }
  </script>

</body>
</html>
